[env:teensy41] ; Put teensy31 for Teensy 3.2 and teensy41 for Teensy 4.1
platform = teensy
board = teensy41
framework = arduino
build_flags = -D USB_MIDI
monitor_speed = 115200
lib_deps = https://github.com/tonton81/SPISlave_T4